<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Monitoring — Nexora Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== BASE VARIABLES ===== */
    :root {
      --primary: #6c63ff; --primary-glow: rgba(108, 99, 255, 0.4);
      --success: #2cb67d; --success-glow: rgba(44, 182, 125, 0.3);
      --error: #e53170; --error-glow: rgba(229, 49, 112, 0.3);
      --warning: #ffb800; --warning-glow: rgba(255, 184, 0, 0.3);
      --text: #ffffff; --text-dim: #a0a0b0; --text-muted: #6b6b80;
      --bg: #0f0f23; --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a3a 100%);
      --card: rgba(255, 255, 255, 0.04); --card-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08); --border-hover: rgba(108, 99, 255, 0.4);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4); --shadow-glow: 0 0 20px var(--primary-glow);
      --radius: 12px; --radius-lg: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== BASE RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-animation::before, .bg-animation::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.3; animation: float 20s ease-in-out infinite;
    }
    .bg-animation::before {
      width: 500px; height: 500px; background: var(--primary);
      top: -150px; right: -150px; animation-delay: 0s;
    }
    .bg-animation::after {
      width: 400px; height: 400px; background: var(--success);
      bottom: -100px; left: -100px; animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ===== GRID PATTERN ===== */
    .grid-pattern {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px; z-index: 0; pointer-events: none;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15, 15, 35, 0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .btn-back {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); cursor: pointer;
      transition: var(--transition); font-weight: 500;
    }
    .btn-back:hover { background: var(--card-hover); border-color: var(--primary); }
    .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    
    /* Parameter Selector */
    .param-selector {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 16px; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px;
    }
    .param-selector label { font-size: 13px; color: var(--text-muted); }
    .param-selector select {
      background: transparent; border: none; color: var(--text);
      font-size: 14px; font-weight: 500; cursor: pointer; outline: none;
      padding: 4px 8px; border-radius: 6px;
    }
    .param-selector select option { background: var(--bg); color: var(--text); }

    /* ===== MAIN CONTENT ===== */
    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    
    /* Machine Grid */
    .machine-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    
    /* Machine Card */
    .machine-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      transition: var(--transition); cursor: pointer;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0; transform: translateY(20px);
    }
    .machine-card:hover {
      background: var(--card-hover); border-color: var(--border-hover);
      transform: translateY(-4px); box-shadow: var(--shadow);
    }
    .machine-card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
    }
    .machine-card:hover::before { left: 100%; }
    
    .machine-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .machine-name {
      font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;
    }
    .machine-status {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: var(--success); color: white; font-weight: 500;
    }
    .machine-status.offline { background: var(--error); }
    
    .machine-value {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px 0; text-align: center;
    }
    .machine-value .icon { font-size: 32px; margin-bottom: 12px; }
    .machine-value .label {
      font-size: 12px; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 8px;
    }
    .machine-value .number {
      font-size: 28px; font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      transition: transform 0.2s ease;
    }
    .machine-value .unit {
      font-size: 14px; color: var(--text-dim); margin-top: 4px;
    }
    
    .machine-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; border-top: 1px solid var(--border);
      font-size: 12px; color: var(--text-muted);
    }
    .machine-card-footer .view-link {
      color: var(--primary); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .machine-card-footer .view-link:hover { text-decoration: underline; }
    
    /* Empty State */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { margin: 0 0 8px 0; color: var(--text); font-size: 18px; }
    .empty-state p { margin: 0; font-size: 14px; }
    
    /* Loading State */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-muted);
    }
    .loading-spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin-right: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Toast */
    .toast {
      position: fixed; top: 24px; right: 24px;
      background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(12px);
      border-left: 4px solid var(--primary); padding: 14px 20px;
      border-radius: 10px; z-index: 9999;
      animation: slideInRight 0.4s ease, fadeOut 0.4s ease 3.6s forwards;
      display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow); min-width: 280px;
    }
    .toast.ok { border-color: var(--success); }
    .toast.err { border-color: var(--error); }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    
    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
      .header-left { width: 100%; justify-content: space-between; }
      .param-selector { width: 100%; justify-content: center; }
      .content { padding: 16px; }
      .machine-grid { grid-template-columns: 1fr; }
      .machine-value .number { font-size: 24px; }
    }
    
    /* Parameter-specific colors */
    .param-energy { color: var(--primary) !important; -webkit-text-fill-color: var(--primary) !important; }
    .param-power { color: var(--success) !important; -webkit-text-fill-color: var(--success) !important; }
    .param-current { color: var(--warning) !important; -webkit-text-fill-color: var(--warning) !important; }
    .param-voltage { color: var(--text) !important; -webkit-text-fill-color: var(--text) !important; }
    .param-apparent { color: var(--text-dim) !important; }
    .param-pf { color: var(--success) !important; -webkit-text-fill-color: var(--success) !important; }
    .param-peak { color: var(--warning) !important; -webkit-text-fill-color: var(--warning) !important; }
    .param-carbon { color: var(--success) !important; -webkit-text-fill-color: var(--success) !important; }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation"></div>
  <div class="grid-pattern"></div>
  
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="btn-back" onclick="location.href='dashboard.html'">
        ← Kembali
      </button>
      <h1 class="header-title">Energy Monitoring</h1>
    </div>
    
    <!-- Parameter Selector -->
    <div class="param-selector">
      <label for="paramSelect">Tampilkan:</label>
      <select id="paramSelect" onchange="E.updateParameter()">
        <option value="energy">Energy (kWh)</option>
        <option value="power">Power (W)</option>
        <option value="current">Current (A)</option>
        <option value="voltage">Voltage (V)</option>
        <option value="apparent">Apparent (VA)</option>
        <option value="pf">Power Factor</option>
        <option value="peak">Peak Power (W)</option>
        <option value="carbon">Carbon (kg)</option>
      </select>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="content">
    <!-- Loading State -->
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      <span>Memuat data mesin...</span>
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📭</div>
      <h3>Belum ada mesin terdaftar</h3>
      <p>Tambahkan mesin di halaman MCB Control untuk mulai monitoring</p>
    </div>
    
    <!-- Machine Grid -->
    <div id="machineGrid" class="machine-grid" style="display:none"></div>
  </main>
  
  <!-- Toast Container -->
  <div id="toastContainer"></div>
  
  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/mcb-manager.js"></script>
  <script>
    const API = 'http://127.0.0.1:3001/api/auth';
    
    // Toast notification
    function toast(m, t = 'info') {
      const e = document.createElement('div');
      e.className = `toast ${t === 'ok' ? 'ok' : t === 'err' ? 'err' : ''}`;
      e.innerHTML = `<span style="font-size:18px">${t === 'ok' ? '✅' : t === 'err' ? '❌' : 'ℹ️'}</span><span>${m}</span>`;
      document.body.appendChild(e);
      setTimeout(() => {
        e.style.animation = 'fadeOut 0.4s ease forwards';
        setTimeout(() => e.remove(), 400);
      }, 3600);
    }
    
    // Energy Monitoring App
    const E = {
      machines: [],
      currentParam: 'energy',
      pollInterval: null,
      
      // Parameter config: key (backend field), icon, label, unit, decimals, color class
      params: {
        energy: { key: 'energy_kwh', label: 'Energy', unit: 'kWh', decimals: 3, class: 'param-energy' },
        power: { key: 'power', label: 'Power', unit: 'W', decimals: 0, class: 'param-power' },
        current: { key: 'current', label: 'Current', unit: 'A', decimals: 3, class: 'param-current' },
        voltage: { key: 'voltage', label: 'Voltage', unit: 'V', decimals: 1, class: 'param-voltage' },
        apparent: { key: 'apparent_power', label: 'Apparent', unit: 'VA', decimals: 0, class: 'param-apparent' },
        pf: { key: 'pf', label: 'Power Factor', unit: '', decimals: 2, class: 'param-pf' },
        peak: { key: 'peak_power', label: 'Peak Power', unit: 'W', decimals: 0, class: 'param-peak' },
        carbon: { key: 'carbon', label: 'Carbon', unit: 'kg CO₂', decimals: 2, class: 'param-carbon' }
      },
      
      async init() {
        const token = localStorage.getItem('authToken');
        if (!token) { location.href = 'index.html'; return; }
        
        await this.loadMachines();
        this.setupParamSelector();
        this.startPolling();
      },
      
      async loadMachines() {
        try {
          const token = localStorage.getItem('authToken');
          const r = await fetch(`${API}/mcb-machines`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const d = await r.json();
          
        if (!d.success) throw new Error(d.message);
        
        // ✅ FIX: Normalisasi nama mesin agar kompatibel dengan berbagai struktur API
        this.machines = (d.machines || []).map(m => ({
          ...m,
          name: m.name || m.machine_name || m.device_name || m.label || `Mesin #${m.id || '??'}`
        }));
        
        this.renderGrid();
          
        } catch (e) {
          console.error('Load machines error:', e);
          toast('❌ Gagal memuat daftar mesin', 'err');
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        }
      },
      
      renderGrid() {
        const grid = document.getElementById('machineGrid');
        const loading = document.getElementById('loadingState');
        const empty = document.getElementById('emptyState');
        
        loading.style.display = 'none';
        
        if (!this.machines.length) {
          empty.style.display = 'block';
          grid.style.display = 'none';
          return;
        }
        
        empty.style.display = 'none';
        grid.style.display = 'grid';
        
        // Render cards with staggered animation
        grid.innerHTML = this.machines.map((m, i) => {
          const param = this.params[this.currentParam];
          const value = this.getParamValue(m, this.currentParam);
          const statusClass = m.last_connected_at ? '' : 'offline';
          
          return `
            <div class="machine-card" data-machine-id="${m.id}" style="animation-delay:${i * 0.05}s" onclick="E.viewMachine('${m.id}')">
              <div class="machine-card-header">
                <div class="machine-name">${this.escapeHtml(m.name)}</div>
                <span class="machine-status ${statusClass}">${m.last_connected_at ? 'Online' : 'Offline'}</span>
              </div>
              
              <div class="machine-value">
                <div class="label">${param.label}</div>
                <div class="number ${param.class}" id="val-${m.id}" data-param="${this.currentParam}">${value}</div>
                <div class="unit">${param.unit}</div>
              </div>
              
              <div class="machine-card-footer">
                <span>Updated: <span id="time-${m.id}">-</span></span>
                <a href="#" class="view-link" onclick="event.stopPropagation(); E.viewMachine('${m.id}')">Lihat Detail →</a>
              </div>
            </div>
          `;
        }).join('');
        
        // Initial fetch for all machines
        this.fetchAllStatus();
      },
      
      getParamValue(machine, paramKey) {
        const data = machine._cachedData;
        if (!data) return '-';
        
        const param = this.params[paramKey];
        if (!param) return '-';
        
        if (paramKey === 'carbon') {
          const factor = data.carbon_factor || 0.85;
          return data.energy_kwh ? (data.energy_kwh * factor).toFixed(param.decimals) : '-';
        }
        
        const val = data[param.key];
        return val !== undefined && val !== null ? parseFloat(val).toFixed(param.decimals) : '-';
      },
      
      setupParamSelector() {
        const select = document.getElementById('paramSelect');
        if (select) select.value = this.currentParam;
      },
      
      updateParameter() {
        const select = document.getElementById('paramSelect');
        this.currentParam = select.value;
        
        // ✅ FIX: Update display without re-rendering entire grid
        this.updateParamDisplay();
        
        // Fetch fresh data for new parameter
        this.fetchAllStatus();
      },
      
      updateParamDisplay() {
        const param = this.params[this.currentParam];
        if (!param) return;
        
        // Update all cards' label, unit, icon, and color class
        document.querySelectorAll('.machine-card').forEach(card => {
          const machineId = card.dataset.machineId;
          if (!machineId) return;
          
          // Update label
          const labelEl = card.querySelector('.machine-value .label');
          if (labelEl) labelEl.textContent = param.label;
          
          // Update unit
          const unitEl = card.querySelector('.machine-value .unit');
          if (unitEl) unitEl.textContent = param.unit;
          
          
          // Update number class for color
          const numberEl = card.querySelector('.machine-value .number');
          if (numberEl) {
            // Remove old param classes
            Object.values(this.params).forEach(p => numberEl.classList.remove(p.class));
            // Add new param class
            numberEl.classList.add(param.class);
            
            // Update value from cached data
            const machine = this.machines.find(m => m.id === machineId);
            if (machine && machine._cachedData) {
              const value = this.getParamValue(machine, this.currentParam);
              numberEl.textContent = value;
              numberEl.dataset.lastVal = value;
              numberEl.dataset.param = this.currentParam;
            }
          }
        });
      },
      
      async fetchAllStatus() {
        if (!this.machines.length) return;
        
        const token = localStorage.getItem('authToken');
        const param = this.params[this.currentParam];
        
        // Fetch status for each machine
        for (const machine of this.machines) {
          try {
            const r = await fetch(`${API}/mcb-machines/${machine.id}/status`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            const d = await r.json();
            
            if (d.success && d.data) {
              // Cache data on machine object
              machine._cachedData = d.data;
              
              // Update card value with animation
              this.updateCardValue(machine.id, d.data, param);
              
              // Update timestamp
              const timeEl = document.getElementById(`time-${machine.id}`);
              if (timeEl) {
                timeEl.textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
              }
              
              // Update status indicator
              const card = document.querySelector(`.machine-card[data-machine-id="${machine.id}"]`);
              if (card) {
                const statusEl = card.querySelector('.machine-status');
                if (statusEl) {
                  statusEl.textContent = d.data.online ? 'Online' : 'Offline';
                  statusEl.className = `machine-status ${d.data.online ? '' : 'offline'}`;
                }
              }
            }
          } catch (e) {
            console.warn(`Fetch status for ${machine.name} error:`, e);
          }
        }
      },
      
      updateCardValue(machineId, data, param) {
        const el = document.getElementById(`val-${machineId}`);
        if (!el) return;
        
        // ✅ FIX: Use param.key for correct field mapping
        const paramKey = param.key || this.currentParam;
        
        let value = '-';
        if (paramKey === 'carbon') {
          const factor = data.carbon_factor || 0.85;
          value = data.energy_kwh ? (data.energy_kwh * factor).toFixed(param.decimals) : '-';
        } else {
          // ✅ FIX: Handle both energy and energy_kwh field names
          const val = data[paramKey] || data[`${paramKey}_kwh`];
          value = val !== undefined && val !== null ? parseFloat(val).toFixed(param.decimals) : '-';
        }
        
        // Animate number change if numeric
        if (value !== '-' && !isNaN(parseFloat(value))) {
          this.animateValue(el, parseFloat(el.dataset.lastVal) || 0, parseFloat(value), 400);
        } else {
          el.textContent = value;
        }
        el.dataset.lastVal = value;
      },
      
      animateValue(el, start, end, duration) {
        const startTime = performance.now();
        const step = (now) => {
          const progress = Math.min((now - startTime) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = start + (end - start) * eased;
          // Preserve decimal places from target value
          const decimals = (end.toString().split('.')[1] || '').length;
          el.textContent = current.toFixed(decimals);
          if (progress < 1) requestAnimationFrame(step);
        };
        requestAnimationFrame(step);
      },
      
      startPolling() {
        // Fetch immediately
        this.fetchAllStatus();
        
        // Then poll every 5 seconds
        if (this.pollInterval) clearInterval(this.pollInterval);
        this.pollInterval = setInterval(() => this.fetchAllStatus(), 5000);
      },
      
      viewMachine(id) {
        sessionStorage.setItem('currentMachineId', id);
        window.location.href = 'machine-view.html';
      },
      
      escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      },
      
      // Cleanup on page unload
      destroy() {
        if (this.pollInterval) clearInterval(this.pollInterval);
      }
    };
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      E.init();
      
      // Cleanup on page leave
      window.addEventListener('beforeunload', () => E.destroy());
    });
  </script>
</body>
</html>
