<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password — AuthPro</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .step-indicator { display:flex; gap:8px; justify-content:center; margin-bottom:25px; }
    .step { flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; transition:0.3s; }
    .step.active { background:var(--primary); }
    .token-box { background:rgba(108,99,255,0.08); border:1px solid var(--primary); border-radius:12px; padding:15px; margin:15px 0; display:none; }
    .token-box.show { display:block; animation:slideUp 0.3s ease; }
    .token-code { font-family:monospace; font-size:12px; word-break:break-all; background:rgba(0,0,0,0.2); padding:10px; border-radius:6px; color:var(--primary-light); margin:8px 0; user-select:all; }
    .btn-action { background:var(--primary); color:#fff; border:none; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; transition:0.2s; }
    .btn-action:hover { background:var(--primary-dark); transform:translateY(-1px); }
    .hint { font-size:12px; color:var(--text-muted); margin-top:8px; line-height:1.4; }
    .pwd-hint { 
      background: rgba(255, 137, 6, 0.15); 
      border: 1px solid rgba(255, 137, 6, 0.3); 
      border-radius: 8px; 
      padding: 10px 15px; 
      margin: 10px 0; 
      font-size: 12px; 
      color: var(--warning);
      display: flex; 
      align-items: center; 
      gap: 8px; 
    }
    .pwd-hint code { 
      background: rgba(0,0,0,0.3); 
      padding: 2px 8px; 
      border-radius: 4px; 
      font-weight: 600; 
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay"><div class="loader"><span></span><span></span><span></span></div></div>
  <div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <div class="grid-pattern"></div>
  <div class="toast-container" id="toastContainer"></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Lupa Password?</h1>
        <p id="stepDesc">Masukkan email terdaftar untuk mendapatkan kode reset</p>
      </div>

      <div class="step-indicator">
        <div class="step active" id="s1"></div>
        <div class="step" id="s2"></div>
        <div class="step" id="s3"></div>
      </div>

      <!-- STEP 1: Email -->
      <form id="emailForm">
        <div class="form-group">
          <label>Email Terdaftar</label>
          <div class="input-wrapper">
            <input type="email" id="forgotEmail" class="form-input" placeholder="nama@email.com" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="emailBtn">
          <span class="btn-text">Dapatkan Kode Reset</span>
          <div class="spinner"></div>
        </button>
      </form>

      <!-- STEP 2: Token & ZIP -->
      <div class="token-box" id="tokenBox">
        <p style="margin:0 0 8px; font-weight:500; color:var(--success)">✅ Kode berhasil dibuat!</p>
        
        <!-- 🔐 Password Hint -->
        <div class="pwd-hint">
          🔐 Password ZIP: <code>rizkal25</code>
        </div>
        
        <div class="token-code" id="tokenDisplay">...</div>
        <button class="btn-action" onclick="downloadProtectedZip()">🔐 Simpan sebagai .zip Terkunci</button>
        <p class="hint">💡 File akan terunduh. Buka pakai Windows Explorer → masukkan password <code>rizkal25</code> → Notepad otomatis terbuka.</p>
      </div>

      <!-- STEP 3: Verify -->
      <form id="verifyForm" style="display:none; margin-top:15px;">
        <div class="form-group">
          <label>Masukkan Kode dari File</label>
          <div class="input-wrapper">
            <input type="text" id="verifyToken" class="form-input" placeholder="Paste 64 karakter token di sini" required>  
          </div>
        </div>
        <button type="submit" class="btn btn-primary" id="verifyBtn">
          <span class="btn-text">✓ Verifikasi & Lanjut Reset</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="auth-footer" style="margin-top:20px;">
        <a href="index.html" class="auth-link">← Kembali ke login</a>
      </div>
    </div>
  </div>

  <!-- Library ZIP Browser-Native -->
  <script src="https://cdn.jsdelivr.net/npm/@zip.js/zip.js@2.7.49/dist/zip.min.js"></script>
  <script src="js/auth.js"></script>
  <script>

    // 🔐 Fungsi Download ZIP dengan Password Fixed: rizkal25
async function downloadProtectedZip() {
  const token = document.getElementById('tokenDisplay').textContent;
  const email = document.getElementById('forgotEmail').value;
  const FIXED_PASSWORD = 'rizkal25'; // 🔐 Password tetap

  try {
    const content = `AUTH PRO - KODE RESET PASSWORD (RAHASIA)
========================================
EMAIL   : ${email}
TOKEN   : ${token}
EXPIRES : 1 JAM
STATUS  : BELUM DIGUNAKAN
========================================
⚠️ PENTING:
- File ini TERKUNCI dengan password: rizkal25
- Hapus file setelah selesai reset password.
- Jangan bagikan file atau password ini ke siapapun.
========================================`;

    // ✅ FIX: encryptionStrength harus 1, 2, atau 3 (bukan 256!)
    const zipWriter = new zip.ZipWriter(
      new zip.BlobWriter("application/zip"), 
      { 
        password: FIXED_PASSWORD, 
        encrypt: true, 
        encryptionStrength: 3  // ✅ AES-256 (paling kuat)
      }
    );
    
    await zipWriter.add("reset-code.txt", new zip.TextReader(content));
    const blob = await zipWriter.close();

    // Trigger download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reset-code-${email.replace(/[@.]/g, '_')}-${Date.now()}.zip`;
    document.body.appendChild(a); 
    a.click(); 
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast('✅ File ZIP terkunci berhasil diunduh! Password: rizkal25', 'success', 5000);
  } catch (err) {
    console.error('ZIP error:', err);
    showToast('❌ Gagal membuat file. Coba lagi.', 'error');
  }
}

    // 📤 Step 1: Request Token dari Backend
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      setButtonLoading('emailBtn', true);
      
      try {
        const res = await fetch(`${API_URL}/forgot-password`, {
          method: 'POST', 
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email: document.getElementById('forgotEmail').value })
        });
        const data = await res.json();
        
        if (data.success) {
          // Tampilkan token
          document.getElementById('tokenDisplay').textContent = data.devToken;
          document.getElementById('tokenBox').classList.add('show');
          
          // UI transition
          document.getElementById('emailForm').style.display = 'none';
          document.getElementById('verifyForm').style.display = 'block';
          document.getElementById('s2').classList.add('active');
          document.getElementById('s3').classList.add('active');
          
          showToast(data.message, 'success');
        } else {
          showToast(data.message, 'error');
        }
      } catch (err) {
        console.error('Fetch error:', err);
        showToast('Gagal terhubung ke server', 'error');
      } finally {
        setButtonLoading('emailBtn', false);
      }
    });

    // 🔍 Step 3: Verify Token & Redirect ke Reset Password
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      setButtonLoading('verifyBtn', true);
      
      const token = document.getElementById('verifyToken').value.trim();
      const email = document.getElementById('forgotEmail').value;

      try {
        const res = await fetch(`${API_URL}/verify-token`, {
          method: 'POST', 
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, token })
        });
        const data = await res.json();
        
        if (data.success) {
          showToast('✅ Kode valid! Mengalihkan ke reset password...', 'success');
          setTimeout(() => {
            window.location.href = `reset-password.html?token=${token}`;
          }, 1000);
        } else {
          showToast(data.message || 'Kode tidak valid', 'error');
        }
      } catch (err) {
        console.error('Verify error:', err);
        showToast('Gagal terhubung ke server', 'error');
      } finally {
        setButtonLoading('verifyBtn', false);
      }
    });

    // Real-time validation: cek panjang token
    document.getElementById('verifyToken').addEventListener('input', function() {
      const error = document.getElementById('verifyTokenError');
      if (this.value.length > 0 && this.value.length !== 64) {
        if (error) {
          error.textContent = `Kode harus 64 karakter (saat ini: ${this.value.length})`;
          error.classList.add('show');
        }
      } else if (error) {
        error.classList.remove('show');
      }
    });
  </script>
</body>
</html>
