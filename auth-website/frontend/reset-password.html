<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — AuthPro</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pwd-strength { margin-top:8px; font-size:11px; color:var(--text-muted); }
    .strength-bar { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin:5px 0; overflow:hidden; }
    .strength-fill { height:100%; width:0%; transition:0.3s; border-radius:2px; }
  </style>
</head>
<body>
  <div class="bg-animation"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
  <div class="grid-pattern"></div>
  <div class="toast-container" id="toastContainer"></div>
  <div class="loading-overlay hidden" id="loadingOverlay"><div class="loader"></div></div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🔐</div>
        <h1>Reset Password</h1>
        <p id="headerDesc">Masukkan password baru Anda</p>
      </div>

      <form id="resetForm">
        <!-- Password Baru -->
        <div class="form-group">
          <label>Password Baru</label>
          <div class="input-wrapper">
            <input type="password" id="newPassword" class="form-input" placeholder="Minimal 8 karakter" required>
            <button type="button" class="toggle-password" onclick="togglePassword('newPassword', this)">👁️</button>
          </div>
          <div class="error-msg" id="newPasswordError"></div>
          <div class="pwd-strength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span id="strengthText"></span>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label>Konfirmasi Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirmPassword" class="form-input" placeholder="Ulangi password" required>
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">👁️</button>
          </div>
          <div class="error-msg" id="confirmPasswordError"></div>
        </div>

        <!-- Button -->
        <button type="submit" class="btn btn-primary" id="resetBtn">
          <span class="btn-text">Update Password</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="auth-footer" style="margin-top:20px">
        <a href="index.html" class="auth-link">← Kembali ke Login</a>
      </div>
    </div>
  </div>

  <!-- Shared Auth Functions -->
  <script>
    const API_URL = 'http://127.0.0.1:3001/api/auth';

    function showToast(message, type = 'info', duration = 4000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.4s ease-out forwards';
        setTimeout(() => toast.remove(), 400);
      }, duration);
    }

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
      else { input.type = 'password'; btn.textContent = '👁️'; }
    }

    function setButtonLoading(btnId, loading) {
      const btn = document.getElementById(btnId);
      if (!btn) return;
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    function checkPasswordStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8) score++;
      if (pwd.length >= 12) score++;
      if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) score++;
      if (/\d/.test(pwd)) score++;
      if (/[^a-zA-Z0-9]/.test(pwd)) score++;
      const levels = [
        { w: '0%', c: 'transparent', t: '' },
        { w: '20%', c: '#E53170', t: 'Sangat Lemah' },
        { w: '40%', c: '#FF8906', t: 'Lemah' },
        { w: '60%', c: '#FFD700', t: 'Cukup' },
        { w: '80%', c: '#2CB67D', t: 'Kuat' },
        { w: '100%', c: '#00D2FF', t: 'Sangat Kuat' },
      ];
      return levels[score] || levels[0];
    }
  </script>

  <!-- Reset Password Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 🔍 Ambil token dari URL
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      
      if (!token) {
        document.getElementById('headerDesc').textContent = '⚠️ Token reset tidak ditemukan!';
        document.getElementById('resetForm').style.display = 'none';
        return;
      }
      console.log('🔑 Token loaded:', token.substring(0, 16) + '...');

      // 💪 Password strength indicator
      const newPassword = document.getElementById('newPassword');
      const strengthFill = document.getElementById('strengthFill');
      const strengthText = document.getElementById('strengthText');

      newPassword.addEventListener('input', function() {
        const s = checkPasswordStrength(this.value);
        strengthFill.style.width = s.w;
        strengthFill.style.background = s.c;
        strengthText.textContent = s.t;
        strengthText.style.color = s.c;
      });

      // 📤 Handle form submit
      document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const pwd = newPassword.value;
        const confirm = document.getElementById('confirmPassword').value;
        
        // Validasi
        if (pwd.length < 8) {
          document.getElementById('newPasswordError').textContent = 'Minimal 8 karakter';
          document.getElementById('newPasswordError').classList.add('show');
          return;
        }
        if (pwd !== confirm) {
          document.getElementById('confirmPasswordError').textContent = 'Password tidak cocok';
          document.getElementById('confirmPasswordError').classList.add('show');
          return;
        }
        
        setButtonLoading('resetBtn', true);
        console.log('🔄 Sending reset request...', { token: token.substring(0,8)+'...', pwdLen: pwd.length });

        try {
          const res = await fetch(`${API_URL}/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token, password: pwd })
          });
          
          const data = await res.json();
          console.log('📡 Response:', data);
          
          if (data.success) {
            showToast('✅ ' + data.message, 'success');
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
          } else {
            showToast('❌ ' + (data.message || 'Gagal reset password'), 'error', 6000);
          }
        } catch (err) {
          console.error('🔥 Fetch error:', err);
          showToast('❌ Gagal terhubung ke server. Pastikan backend running.', 'error', 6000);
        } finally {
          setButtonLoading('resetBtn', false);
        }
      });

      // Clear error on focus
      ['newPassword', 'confirmPassword'].forEach(id => {
        document.getElementById(id).addEventListener('focus', () => {
          const err = document.getElementById(id + 'Error');
          if (err) err.classList.remove('show');
        });
      });
    });
  </script>
</body>
</html>
