<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — AuthPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Background -->
  <div class="bg-animation">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="grid-pattern"></div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Main -->
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">🔐</div>
        <h1>Selamat Datang Kembali</h1>
        <p>Masuk ke akun Anda untuk melanjutkan</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <div class="input-wrapper">
            <input type="email" id="loginEmail" class="form-input" placeholder="nama@email.com" autocomplete="email" required>
            <span class="icon">✉️</span>
          </div>
          <div class="error-msg" id="loginEmailError">Masukkan email yang valid</div>
        </div>

        <div class="form-group">
          <label for="loginPassword">Password</label>
          <div class="input-wrapper">
            <input type="password" id="loginPassword" class="form-input" placeholder="Masukkan password" autocomplete="current-password" required>
            <span class="icon">🔒</span>
            <button type="button" class="password-toggle" onclick="togglePassword('loginPassword', this)">👁️</button>
          </div>
          <div class="error-msg" id="loginPasswordError">Password wajib diisi</div>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Ingat saya</label>
        </div>

        <a href="forgot-password.html" class="forgot-link">Lupa password?</a>

        <button type="submit" class="btn btn-primary" id="loginBtn">
          <span class="btn-text">Masuk</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider"><span>atau</span></div>


      <div class="auth-footer">
        Belum punya akun? <a href="register.html" class="auth-link">Daftar sekarang</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
