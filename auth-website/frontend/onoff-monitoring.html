<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ON/OFF Monitoring — Nexora Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== BASE VARIABLES ===== */
    :root {
      --primary: #6c63ff; --primary-glow: rgba(108, 99, 255, 0.4);
      --success: #2cb67d; --success-glow: rgba(44, 182, 125, 0.3);
      --error: #e53170; --error-glow: rgba(229, 49, 112, 0.3);
      --warning: #ffb800; --warning-glow: rgba(255, 184, 0, 0.3);
      --text: #ffffff; --text-dim: #a0a0b0; --text-muted: #6b6b80;
      --bg: #0f0f23; --bg-gradient: linear-gradient(135deg, #0f0f23 0%, #1a1a3a 100%);
      --card: rgba(255, 255, 255, 0.04); --card-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.08); --border-hover: rgba(108, 99, 255, 0.4);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4); --shadow-glow: 0 0 20px var(--primary-glow);
      --radius: 12px; --radius-lg: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== BASE RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ===== ANIMATED BACKGROUND ===== */
    .bg-animation {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .bg-animation::before, .bg-animation::after {
      content: ''; position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.3; animation: float 20s ease-in-out infinite;
    }
    .bg-animation::before {
      width: 500px; height: 500px; background: var(--primary);
      top: -150px; right: -150px; animation-delay: 0s;
    }
    .bg-animation::after {
      width: 400px; height: 400px; background: var(--success);
      bottom: -100px; left: -100px; animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ===== GRID PATTERN ===== */
    .grid-pattern {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px; z-index: 0; pointer-events: none;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15, 15, 35, 0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .btn-back {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); cursor: pointer;
      transition: var(--transition); font-weight: 500;
    }
    .btn-back:hover { background: var(--card-hover); border-color: var(--primary); }
    .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    
    /* Status Filter */
    .status-filter {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; font-size: 13px; color: var(--text-muted);
    }
    .status-filter select {
      background: transparent; border: none; color: var(--text);
      font-size: 14px; font-weight: 500; cursor: pointer; outline: none;
    }
    .status-filter select option { background: var(--bg); color: var(--text); }

    /* ===== MAIN CONTENT ===== */
    .content { padding: 24px; max-width: 1400px; margin: 0 auto; }
    
    /* Summary Bar */
    .summary-bar {
      display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap;
    }
    .summary-card {
      flex: 1; min-width: 150px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 16px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .summary-card .icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .summary-card .icon.all { background: rgba(108, 99, 255, 0.2); }
    .summary-card .icon.on { background: rgba(44, 182, 125, 0.2); }
    .summary-card .icon.off { background: rgba(229, 49, 112, 0.2); }
    .summary-card .label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .summary-card .value { font-size: 24px; font-weight: 700; }
    
    /* Machine Grid */
    .machine-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    
    /* Machine Card - ON/OFF Focus */
    .machine-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 20px;
      transition: var(--transition); cursor: pointer;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
      animation: fadeInUp 0.4s ease forwards;
      opacity: 0; transform: translateY(20px);
    }
    .machine-card:hover {
      background: var(--card-hover); border-color: var(--border-hover);
      transform: translateY(-4px); box-shadow: var(--shadow);
    }
    .machine-card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s ease;
    }
    .machine-card:hover::before { left: 100%; }
    
    /* Status indicator ring */
    .machine-card::after {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      transition: background 0.3s ease;
    }
    .machine-card[status="on"]::after { background: var(--success); box-shadow: 0 0 10px var(--success-glow); }
    .machine-card[status="off"]::after { background: var(--error); box-shadow: 0 0 10px var(--error-glow); }
    .machine-card[status="offline"]::after { background: var(--text-muted); }
    
    .machine-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .machine-name {
      font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;
      max-width: 70%;
    }
    .machine-status {
      font-size: 11px; padding: 4px 10px; border-radius: 20px;
      background: var(--success); color: white; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .machine-status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; animation: pulse 2s ease-in-out infinite;
    }
    .machine-status.offline { background: var(--text-muted); }
    .machine-status.offline::before { animation: none; }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    
    /* Big Status Display */
    .status-display {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 20px 0; text-align: center; position: relative;
    }
    
    /* Status Ring Animation */
    .status-ring {
      position: relative; width: 120px; height: 120px; margin-bottom: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .status-ring::before {
      content: ''; position: absolute; width: 100%; height: 100%;
      border-radius: 50%; border: 4px solid var(--border);
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .status-ring::after {
      content: ''; position: absolute; width: 90%; height: 90%;
      border-radius: 50%; border: 4px solid transparent;
      border-top-color: currentColor;
      animation: spin 1s linear infinite;
      opacity: 0; transition: opacity 0.3s ease;
    }
    .status-ring.updating::after { opacity: 1; }
    
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .status-display[status="on"] .status-ring::before {
      border-color: var(--success);
      box-shadow: 0 0 0 4px rgba(44, 182, 125, 0.2), 0 0 20px var(--success-glow);
    }
    .status-display[status="off"] .status-ring::before {
      border-color: var(--error);
      box-shadow: 0 0 0 4px rgba(229, 49, 112, 0.2), 0 0 20px var(--error-glow);
    }
    .status-display[status="offline"] .status-ring::before {
      border-color: var(--text-muted);
      box-shadow: none;
    }
    
    .status-label {
      font-size: 28px; font-weight: 800; text-transform: uppercase;
      letter-spacing: 2px; transition: color 0.3s ease;
    }
    .status-display[status="on"] .status-label {
      color: var(--success); text-shadow: 0 0 20px var(--success-glow);
    }
    .status-display[status="off"] .status-label {
      color: var(--error); text-shadow: 0 0 20px var(--error-glow);
    }
    .status-display[status="offline"] .status-label {
      color: var(--text-muted); text-shadow: none;
    }
    
    .status-sublabel {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
    }
/*     
    Toggle Button */
    /* .toggle-btn {
      width: 100%; padding: 12px; border-radius: 10px; border: none;
      font-weight: 600; font-size: 14px; cursor: pointer;
      transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 16px;
    } */
    /* .toggle-btn.on {
      background: linear-gradient(135deg, var(--error), #c4255a);
      color: white; box-shadow: 0 4px 15px var(--error-glow);
    }
    .toggle-btn.on:hover {
      transform: translateY(-2px); box-shadow: 0 8px 25px var(--error-glow);
    }
    .toggle-btn.off {
      background: linear-gradient(135deg, var(--success), #1e9a6a);
      color: white; box-shadow: 0 4px 15px var(--success-glow);
    }
    .toggle-btn.off:hover {
      transform: translateY(-2px); box-shadow: 0 8px 25px var(--success-glow);
    } */
    .toggle-btn:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none !important;
    }
    .toggle-btn .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: none;
    }
    .toggle-btn.loading .spinner { display: block; }
    .toggle-btn.loading .btn-text { display: none; }
    
    /* Card Footer */
    .machine-card-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 12px; border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-muted);
    }
    .machine-card-footer .view-link {
      color: var(--primary); text-decoration: none; font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .machine-card-footer .view-link:hover { text-decoration: underline; }
    
    /* Empty State */
    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--text-muted);
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-state h3 { margin: 0 0 8px 0; color: var(--text); font-size: 18px; }
    .empty-state p { margin: 0; font-size: 14px; }
    
    /* Loading State */
    .loading-state {
      display: flex; align-items: center; justify-content: center;
      padding: 40px; color: var(--text-muted);
    }
    .loading-spinner {
      width: 24px; height: 24px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 1s linear infinite; margin-right: 12px;
    }
    
    /* Toast */
    .toast {
      position: fixed; top: 24px; right: 24px;
      background: rgba(26, 26, 46, 0.95); backdrop-filter: blur(12px);
      border-left: 4px solid var(--primary); padding: 14px 20px;
      border-radius: 10px; z-index: 9999;
      animation: slideInRight 0.4s ease, fadeOut 0.4s ease 3.6s forwards;
      display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow); min-width: 280px;
    }
    .toast.ok { border-color: var(--success); }
    .toast.err { border-color: var(--error); }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    
    /* Animations */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; flex-wrap: wrap; gap: 12px; }
      .header-left { width: 100%; justify-content: space-between; }
      .status-filter { width: 100%; justify-content: center; }
      .content { padding: 16px; }
      .summary-bar { flex-direction: column; }
      .machine-grid { grid-template-columns: 1fr; }
      .status-ring { width: 100px; height: 100px; }
      .status-label { font-size: 24px; }
    }
  </style>
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-animation"></div>
  <div class="grid-pattern"></div>
  
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="btn-back" onclick="location.href='dashboard.html'">← Kembali</button>
      <h1 class="header-title">🔘 ON/OFF Monitoring</h1>
    </div>
    
    <!-- Status Filter -->
    <div class="status-filter">
      <label for="statusFilter">Filter:</label>
      <select id="statusFilter" onchange="O.filterMachines()">
        <option value="all">Semua</option>
        <option value="on">🟢 ON</option>
        <option value="off">🔴 OFF</option>
        <option value="offline">⚪ Offline</option>
      </select>
    </div>
  </header>
  
  <!-- Main Content -->
  <main class="content">
    <!-- Summary Bar -->
    <div class="summary-bar">
      <div class="summary-card">
        <div class="icon all">📊</div>
        <div>
          <div class="label">Total Mesin</div>
          <div class="value" id="summaryTotal">0</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="icon on">🟢</div>
        <div>
          <div class="label">Sedang ON</div>
          <div class="value" id="summaryOn">0</div>
        </div>
      </div>
      <div class="summary-card">
        <div class="icon off">🔴</div>
        <div>
          <div class="label">Sedang OFF</div>
          <div class="value" id="summaryOff">0</div>
        </div>
      </div>
    </div>
    
    <!-- Loading State -->
    <div id="loadingState" class="loading-state">
      <div class="loading-spinner"></div>
      <span>Memuat status mesin...</span>
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="icon">📭</div>
      <h3>Belum ada mesin terdaftar</h3>
      <p>Tambahkan mesin di halaman MCB Control untuk mulai monitoring</p>
    </div>
    
    <!-- Machine Grid -->
    <div id="machineGrid" class="machine-grid" style="display:none"></div>
  </main>
  
  <!-- Toast Container -->
  <div id="toastContainer"></div>
  
  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/mcb-manager.js"></script>
  <script>
    const API = 'http://127.0.0.1:3001/api/auth';
    
    // Toast notification
    function toast(m, t = 'info') {
      const e = document.createElement('div');
      e.className = `toast ${t === 'ok' ? 'ok' : t === 'err' ? 'err' : ''}`;
      e.innerHTML = `<span style="font-size:18px">${t === 'ok' ? '✅' : t === 'err' ? '❌' : 'ℹ️'}</span><span>${m}</span>`;
      document.body.appendChild(e);
      setTimeout(() => {
        e.style.animation = 'fadeOut 0.4s ease forwards';
        setTimeout(() => e.remove(), 400);
      }, 3600);
    }
    
    // ON/OFF Monitoring App
    const O = {
      machines: [],
      currentFilter: 'all',
      pollInterval: null,
      pendingToggles: {}, // Track pending toggle actions
      
      async init() {
        const token = localStorage.getItem('authToken');
        if (!token) { location.href = 'index.html'; return; }
        
        await this.loadMachines();
        this.startPolling();
      },
      
      async loadMachines() {
        try {
          const token = localStorage.getItem('authToken');
          const r = await fetch(`${API}/mcb-machines`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const d = await r.json();
          
          if (!d.success) throw new Error(d.message);
          
          this.machines = d.machines || [];
          this.renderGrid();
          this.updateSummary();
          
        } catch (e) {
          console.error('Load machines error:', e);
          toast('❌ Gagal memuat daftar mesin', 'err');
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('emptyState').style.display = 'block';
        }
      },
      
      renderGrid() {
        const grid = document.getElementById('machineGrid');
        const loading = document.getElementById('loadingState');
        const empty = document.getElementById('emptyState');
        
        loading.style.display = 'none';
        
        // Filter machines
        let filtered = this.machines;
        if (this.currentFilter !== 'all') {
          filtered = this.machines.filter(m => {
            const status = m._cachedData?.online ? (m._cachedData?.relay ? 'on' : 'off') : 'offline';
            return status === this.currentFilter;
          });
        }
        
        if (!filtered.length) {
          empty.style.display = 'block';
          empty.querySelector('p').textContent = 
            this.currentFilter === 'all' 
              ? 'Tidak ada mesin terdaftar'
              : `Tidak ada mesin dengan status ${this.currentFilter.toUpperCase()}`;
          grid.style.display = 'none';
          return;
        }
        
        empty.style.display = 'none';
        grid.style.display = 'grid';
        
        // Render cards with staggered animation
        grid.innerHTML = filtered.map((m, i) => {
          const data = m._cachedData || {};
          const status = data.online ? (data.relay ? 'on' : 'off') : 'offline';
          const statusText = status === 'on' ? 'ON' : status === 'off' ? 'OFF' : 'Offline';
          const isOnline = data.online;
          
          return `
            <div class="machine-card" data-machine-id="${m.id}" id="card-${m.id}" status="${status}" style="animation-delay:${i * 0.05}s" onclick="O.viewMachine('${m.id}')">
              <div class="machine-card-header">
                <div class="machine-name" title="${this.escapeHtml(m.name)}"> ${this.escapeHtml(m.name)}</div>
                <span class="machine-status ${isOnline ? '' : 'offline'}" id="badge-${m.id}">${statusText}</span>
              </div>
              
              <div class="status-display" id="display-${m.id}" status="${status}">
                <div class="status-ring" id="ring-${m.id}"></div>
                <div class="status-label" id="label-${m.id}">${statusText}</div>
                <div class="status-sublabel">Relay Status</div>
              </div>
              
              <button class="toggle-btn ${status === 'on' ? 'on' : 'off'}" 
                      id="btn-${m.id}" 
                      data-machine-id="${m.id}"
                      onclick="event.stopPropagation(); O.toggleRelay('${m.id}', '${status}')"
                      ${!isOnline ? 'disabled' : ''}>
                <span class="spinner"></span>
                
              </button>
              
              <div class="machine-card-footer">
                <span>Updated: <span id="time-${m.id}">-</span></span>
                <a href="#" class="view-link" onclick="event.stopPropagation(); O.viewMachine('${m.id}')">Lihat Detail →</a>
              </div>
            </div>
          `;
        }).join('');
        
        // Initial fetch for all machines
        this.fetchAllStatus();
      },
      
      updateSummary() {
        const total = this.machines.length;
        let on = 0, off = 0;
        
        this.machines.forEach(m => {
          const data = m._cachedData;
          if (data?.online) {
            if (data.relay) on++; else off++;
          }
        });
        
        document.getElementById('summaryTotal').textContent = total;
        document.getElementById('summaryOn').textContent = on;
        document.getElementById('summaryOff').textContent = off;
      },
      
      filterMachines() {
        const select = document.getElementById('statusFilter');
        this.currentFilter = select.value;
        this.renderGrid();
      },
      
      async fetchAllStatus() {
        if (!this.machines.length) return;
        
        const token = localStorage.getItem('authToken');
        
        for (const machine of this.machines) {
          // Skip if there's a pending toggle for this machine
          if (this.pendingToggles[machine.id]) continue;
          
          try {
            const ringEl = document.getElementById(`ring-${machine.id}`);
            if (ringEl) ringEl.classList.add('updating');
            
            const r = await fetch(`${API}/mcb-machines/${machine.id}/status`, {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            const d = await r.json();
            
            if (ringEl) ringEl.classList.remove('updating');
            
            if (d.success && d.data) {
              machine._cachedData = d.data;
              this.updateCardStatus(machine.id, d.data);
              
              // Update timestamp
              const timeEl = document.getElementById(`time-${machine.id}`);
              if (timeEl) {
                timeEl.textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
              }
            }
          } catch (e) {
            console.warn(`Fetch status for ${machine.name} error:`, e);
            const ringEl = document.getElementById(`ring-${machine.id}`);
            if (ringEl) ringEl.classList.remove('updating');
          }
        }
        
        this.updateSummary();
      },
      
      updateCardStatus(machineId, data) {
        const status = data.online ? (data.relay ? 'on' : 'off') : 'offline';
        const statusText = status === 'on' ? 'ON' : status === 'off' ? 'OFF' : 'Offline';
        
        // Update card attribute
        const card = document.querySelector(`.machine-card[data-machine-id="${machineId}"]`);
        if (card) card.setAttribute('status', status);
        
        // Update display
        const display = document.getElementById(`display-${machineId}`);
        const label = document.getElementById(`label-${machineId}`);
        const btn = document.getElementById(`btn-${machineId}`);
        const badge = document.getElementById(`badge-${machineId}`);
        
        if (display) display.setAttribute('status', status);
        if (label) label.textContent = statusText;
        
        // Update button
        if (btn) {
          btn.className = `toggle-btn ${status === 'on' ? 'on' : 'off'}`;
          const btnText = btn.querySelector('.btn-text');
          if (btnText) btnText.textContent = status === 'on' ? '🔴 TURN OFF' : '🟢 TURN ON';
          btn.disabled = !data.online;
        }
        
        // Update status badge in header
        if (badge) {
          badge.textContent = statusText;
          badge.className = `machine-status ${data.online ? '' : 'offline'}`;
        }
        
        // Animate status change
        if (label && data.online) {
          label.style.animation = 'none';
          label.offsetHeight; // Trigger reflow
          label.style.animation = 'pulse 0.4s ease';
        }
      },
      
      // ✅ FIX: Optimistic UI update + delay before sync
      async toggleRelay(machineId, currentStatus) {
        const btn = document.getElementById(`btn-${machineId}`);
        if (!btn || btn.disabled) return;
        
        const machine = this.machines.find(m => m.id === machineId);
        if (!machine) return;
        
        const targetAction = currentStatus === 'on' ? 'off' : 'on';
        const targetStatus = targetAction === 'on' ? 'on' : 'off';
        const confirmMsg = `Yakin ingin ${targetAction === 'on' ? 'MENYALAKAN' : 'MEMATIKAN'} "${machine.name}"?`;
        
        if (!confirm(confirmMsg)) return;
        
        // ✅ FIX: Optimistic UI update - update visual immediately
        this.updateCardStatusOptimistic(machineId, targetStatus);
        
        // Mark as pending to skip polling updates
        this.pendingToggles[machineId] = true;
        
        // Show loading state
        btn.classList.add('loading');
        btn.disabled = true;
        
        try {
          const token = localStorage.getItem('authToken');
          const r = await fetch(`${API}/mcb-machines/${machineId}/control`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: targetAction })
          });
          const d = await r.json();
          
          if (d.success) {
            toast(`✅ ${machine.name} ${targetAction === 'on' ? 'DINYALAKAN' : 'DIMATIKAN'}`, 'ok');
            
            // ✅ FIX: Delay before fetching to let HA update state
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // Fetch fresh status for this machine only
            await this.fetchSingleStatus(machineId);
          } else {
            toast(`❌ ${d.message || 'Gagal mengubah status'}`, 'err');
            // Revert optimistic update on error
            this.updateCardStatus(machineId, machine._cachedData || {});
          }
        } catch (e) {
          console.error('Toggle relay error:', e);
          toast('❌ Gagal terhubung ke server', 'err');
          // Revert optimistic update on error
          this.updateCardStatus(machineId, machine._cachedData || {});
        } finally {
          // Clear pending flag and re-enable button
          delete this.pendingToggles[machineId];
          const freshBtn = document.getElementById(`btn-${machineId}`);
          if (freshBtn) {
            freshBtn.classList.remove('loading');
            freshBtn.disabled = false;
          }
        }
      },
      
      // ✅ FIX: Optimistic UI update without waiting for backend
      updateCardStatusOptimistic(machineId, newStatus) {
        const statusText = newStatus === 'on' ? 'ON' : 'OFF';
        
        // Update card attribute
        const card = document.querySelector(`.machine-card[data-machine-id="${machineId}"]`);
        if (card) card.setAttribute('status', newStatus);
        
        // Update display
        const display = document.getElementById(`display-${machineId}`);
        const label = document.getElementById(`label-${machineId}`);
        const btn = document.getElementById(`btn-${machineId}`);
        const badge = document.getElementById(`badge-${machineId}`);
        
        if (display) display.setAttribute('status', newStatus);
        if (label) {
          label.textContent = statusText;
          label.style.animation = 'none';
          label.offsetHeight;
          label.style.animation = 'pulse 0.4s ease';
        }
        
        // Update button
        if (btn) {
          btn.className = `toggle-btn ${newStatus === 'on' ? 'on' : 'off'}`;
          const btnText = btn.querySelector('.btn-text');
          if (btnText) btnText.textContent = newStatus === 'on' ? '🔴 TURN OFF' : '🟢 TURN ON';
        }
        
        // Update status badge
        if (badge) {
          badge.textContent = statusText;
          badge.className = `machine-status ${newStatus !== 'offline' ? '' : 'offline'}`;
        }
        
        // Update cached data for summary
        const machine = this.machines.find(m => m.id === machineId);
        if (machine) {
          machine._cachedData = {
            ...(machine._cachedData || {}),
            relay: newStatus === 'on',
            online: true
          };
          this.updateSummary();
        }
      },
      
      // ✅ FIX: Fetch status for single machine only
      async fetchSingleStatus(machineId) {
        const token = localStorage.getItem('authToken');
        const machine = this.machines.find(m => m.id === machineId);
        if (!machine) return;
        
        try {
          const r = await fetch(`${API}/mcb-machines/${machineId}/status`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
          });
          const d = await r.json();
          
          if (d.success && d.data) {
            machine._cachedData = d.data;
            this.updateCardStatus(machineId, d.data);
            
            // Update timestamp
            const timeEl = document.getElementById(`time-${machineId}`);
            if (timeEl) {
              timeEl.textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
            }
            this.updateSummary();
          }
        } catch (e) {
          console.warn(`Fetch single status for ${machine.name} error:`, e);
        }
      },
      
      startPolling() {
        // Fetch immediately
        this.fetchAllStatus();
        
        // Then poll every 3 seconds for real-time feel
        if (this.pollInterval) clearInterval(this.pollInterval);
        this.pollInterval = setInterval(() => this.fetchAllStatus(), 3000);
      },
      
      viewMachine(id) {
        sessionStorage.setItem('currentMachineId', id);
        window.location.href = 'machine-view.html';
      },
      
      escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      },
      
      // Cleanup on page unload
      destroy() {
        if (this.pollInterval) clearInterval(this.pollInterval);
      }
    };
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      O.init();
      window.addEventListener('beforeunload', () => O.destroy());
    });
  </script>
</body>
</html>
